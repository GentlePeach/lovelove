<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Love</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050505; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .heart {
            position: absolute;
            color: #ff2d55;
            font-size: 12px;
            user-select: none;
            pointer-events: none;
            will-change: transform;
            transition: transform 2s cubic-bezier(0.19, 1, 0.22, 1), opacity 1s;
            z-index: 1;
        }

        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff2d55, #ff5e7e);
            color: white;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.4);
            white-space: nowrap;
        }

        /* Chữ sáng rực lên khi gom lại */
        .glow {
            text-shadow: 0 0 8px #ff2d55, 0 0 15px #ff2d55;
            font-size: 15px !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <button id="startBtn">Nhấn vào đây đi! ❤️</button>
    
    <audio id="bgMusic" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/09/Perfect-Beauty.mp3" type="audio/mpeg">
    </audio>

    <div id="container"></div>

    <script>
        const container = document.getElementById('container');
        const startBtn = document.getElementById('startBtn');
        const music = document.getElementById('bgMusic');
        const hearts = [];
        const heartCount = 1000; // Tăng lên 1000 hạt cho cực dày

        // Pattern chữ I LOVE YOU rút gọn để vừa màn hình dọc
        const pattern = [
            "I   L   OOO  V   V  EEEE",
            "I   L  O   O V   V  E   ",
            "I   L  O   O  V V   EEEE",
            "I   L  O   O   V    E   ",
            "I   LLLL OOO   V    EEEE",
            "                        ", // Khoảng trống
            "   Y   Y   OOO   U   U  ",
            "    Y Y   O   O  U   U  ",
            "     Y    O   O  U   U  ",
            "     Y    O   O  U   U  ",
            "     Y     OOO    UUU   "
        ];

        function init() {
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤';
                
                // Vị trí xuất phát ngẫu nhiên
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                
                heart.style.transform = `translate(${x}px, ${y}px) scale(0)`;
                heart.style.opacity = '0';
                
                container.appendChild(heart);
                hearts.push({ el: heart });
            }
        }

        function getTargetPoints() {
            const points = [];
            const isMobile = window.innerWidth < 600;
            
            // Tính toán khoảng cách hạt dựa trên chiều rộng màn hình
            const spacing = isMobile ? (window.innerWidth / 26) : 22; 
            const offsetX = (window.innerWidth - pattern[0].length * spacing) / 2;
            const offsetY = (window.innerHeight - pattern.length * spacing) / 2;

            for (let y = 0; y < pattern.length; y++) {
                for (let x = 0; x < pattern[y].length; x++) {
                    if (pattern[y][x] !== " ") {
                        // Tạo 4 hạt tại mỗi tọa độ để chữ siêu dày (Bold)
                        for(let k = 0; k < 4; k++) {
                            points.push({
                                x: x * spacing + offsetX + (Math.random() * 6 - 3),
                                y: y * spacing + offsetY + (Math.random() * 6 - 3)
                            });
                        }
                    }
                }
            }
            return points;
        }

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            music.play().catch(() => {});

            const targetPoints = getTargetPoints();

            // Bước 1: Hiệu ứng gió thổi lung tung ban đầu
            hearts.forEach((h, i) => {
                const randomX = Math.random() * window.innerWidth;
                const randomY = Math.random() * window.innerHeight;
                h.el.style.opacity = '0.6';
                h.el.style.transform = `translate(${randomX}px, ${randomY}px) scale(1) rotate(${Math.random() * 360}deg)`;
            });

            // Bước 2: Gom lại thành chữ sau 1 giây
            setTimeout(() => {
                hearts.forEach((h, i) => {
                    if (i < targetPoints.length) {
                        const target = targetPoints[i];
                        h.el.className = 'heart glow';
                        h.el.style.transform = `translate(${target.x}px, ${target.y}px) scale(1.1) rotate(0deg)`;
                    } else {
                        // Hạt thừa bay tản mác
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 200 + 100;
                        const tx = window.innerWidth/2 + Math.cos(angle) * dist;
                        const ty = window.innerHeight/2 + Math.sin(angle) * dist;
                        h.el.style.opacity = '0.2';
                        h.el.style.transform = `translate(${tx}px, ${ty}px) scale(0.5)`;
                    }
                });
            }, 1000);
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
